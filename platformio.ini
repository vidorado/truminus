; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32@6.10.0
; for the C3 Supermini
;board =  dfrobot_beetle_esp32c3
; for the goouuu esp32 c3
board = esp32-c3-devkitc-02
; for the wroom 32
;board = esp32doit-devkit-v1
framework = arduino
;board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs
monitor_speed = 115200
;doesn't work with the esp32 c3
monitor_filters = esp32_exception_decoder
;only for the esp32doit-devkit-v1 board
;monitor_rts = 0
;monitor_dtr = 0
build_type = release
; use -DGOOUUUC3 for the goouuu esp32 c3, -DC3SUPERMINI for the c3 supermini, -DWROOM32 for the Wroom32
build_flags = 
	-std=gnu++17
	-Wfatal-errors
	-DCORE_DEBUG_LEVEL=3
	-DWS_MAX_QUEUED_MESSAGES=256
	-DGOOUUUC3
	-DWEBSERVER
	-DAUTODISCOVERY
;add
;	-DARDUINO_USB_MODE=1
;	-DARDUINO_USB_CDC_ON_BOOT=1
;for the c3 supermini
;
;add
;	-DCOMBIGAS for combi gas firmware V05.00.00 (just for testing, not working yet)

build_unflags = 
	-std=gnu++11
lib_deps = 
	cyijun/ESP32MQTTClient@^0.3.0
	https://github.com/mestrode/Lin-Interface-Library.git#99ee08b4ecdc00367500dcee6aae006b8328b857
	;ottowinter/ESPAsyncWebServer-esphome@^3.1.0 <--crashes and burns
	mathieucarbou/ESP Async WebServer@^2.9.0
 	bblanchon/ArduinoJson@^7.0.4

[env:truminus]
;no changed settings

[env:truminus_ota]
upload_protocol = espota
upload_port =truminus.local

[env:cyd]
board = esp32-2432S028R
board_build.partitions = min_spiffs.csv
upload_port = COM4
monitor_port = COM4
build_flags =
	-std=gnu++17
	-Wfatal-errors
	-DCORE_DEBUG_LEVEL=1
	-DWS_MAX_QUEUED_MESSAGES=256
	-DCYD
	-DWEBSERVER
	-DAUTODISCOVERY
	-DLV_CONF_INCLUDE_SIMPLE
	-DLV_CONF_SUPPRESS_DEFINE_CHECK
	-DLV_FONT_MONTSERRAT_14=1
	-DLV_FONT_MONTSERRAT_20=1
	-DLV_FONT_MONTSERRAT_28=1
	-DLVGL_BUFFER_PIXELS="(DISPLAY_WIDTH*DISPLAY_HEIGHT/10)"
build_unflags =
	-std=gnu++11
	-DLVGL_BUFFER_PIXELS=(DISPLAY_WIDTH*DISPLAY_HEIGHT/4)
lib_deps =
	cyijun/ESP32MQTTClient@^0.3.0
	https://github.com/mestrode/Lin-Interface-Library.git#99ee08b4ecdc00367500dcee6aae006b8328b857
	mathieucarbou/ESP Async WebServer@^2.9.0
	bblanchon/ArduinoJson@^7.0.4
	https://github.com/rzeldent/esp32-smartdisplay.git#a49bf44

[env:cyd_ota]
board = esp32-2432S028R
board_build.partitions = min_spiffs.csv
upload_protocol = espota
upload_port = truminus.local
build_flags =
	-std=gnu++17
	-Wfatal-errors
	-DCORE_DEBUG_LEVEL=1
	-DWS_MAX_QUEUED_MESSAGES=256
	-DCYD
	-DWEBSERVER
	-DAUTODISCOVERY
	-DLV_CONF_INCLUDE_SIMPLE
	-DLV_CONF_SUPPRESS_DEFINE_CHECK
	-DLV_FONT_MONTSERRAT_14=1
	-DLV_FONT_MONTSERRAT_20=1
	-DLV_FONT_MONTSERRAT_28=1
build_unflags =
	-std=gnu++11
lib_deps =
	cyijun/ESP32MQTTClient@^0.3.0
	https://github.com/mestrode/Lin-Interface-Library.git#99ee08b4ecdc00367500dcee6aae006b8328b857
	mathieucarbou/ESP Async WebServer@^2.9.0
	bblanchon/ArduinoJson@^7.0.4
	https://github.com/rzeldent/esp32-smartdisplay.git#a49bf44
